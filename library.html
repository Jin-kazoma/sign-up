<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Archive</title>
    <link rel="stylesheet" href="library.css">
</head>
<body>
    
    <div class="side-bar"> 
        <img src="https://i.pinimg.com/736x/1e/ee/67/1eee67900328eef6863bcc261bb37569.jpg" alt="gojo">
         <p id="side-info">Photo by 美里 on <a href="https://ph.pinterest.com/">pinterest</a></p>
    
    </div>


    <form action="#" method="get">

        <h2 class="info">Wellcome to online Manga Library</h2>
        <br>

        <div class="form-grid">

        <div>
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="fname" required>
        </div>

        <div>
        <label for="lname">Last Name</label> 
        <input type="text" id="lname" name="lname" required>
        </div>

        <div>
        <label for="email">Email</label>
        <input type="text" id="email" name="email" required> 
        </div>

        <div>
        <label for="num">Phone Number</label>
        <input type="text" id="num" name="num" required>
        </div>

        <div>
        <label for="pass">Password</label>
        <input type="text" id="pass" name="pass" required>
        </div>

        <div>
        <label for="cpass">Confirm Password</label>
        <input type="text" id="cpass" name="cpass" required> 
        </div>

        </div>

        <button id="btn">Create Account</button>
        <p id="acc">All ready have account?<a href="">Log in</a></p>
    </form>

   

    <script src="library.js"></script>
</body>
</html>
